<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valentine's Flowers - Order Online</title>
    <link rel="stylesheet" href="tutorial9.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-logo"><img src="./images/logo.jpg" alt="logo" id="logo-image"> Valentine's Flowers</div>
        <div class="hamburger" onclick="toggleMenu()">☰</div>
        <ul class="nav-links" id="navLinks">
            <li><a href="#productList">Shop</a></li>
            <li><a href="#cart">Cart</a></li>
            <li><a href="#deliveryDate">Delivery</a></li>
        </ul>
    </nav>
    
    <header>
        <h1> Order Now !</h1>
    </header>
    
    <div class="container">  
        <div class="products" id="productList"></div>
    </div>

    <div class="order-section">
        <h2>Your Order</h2>
        <div id="cart"></div>
        <p>Total: <span id="totalPrice">£0</span></p>
        
        <label for="champagne" class="cham">Add Champagne (£10 extra):</label>
        <input type="checkbox" id="champagne" onchange="toggleChampagne()"> <br><br>
        
        <label for="deliveryDate">Delivery Date:</label>
        <input type="date" id="deliveryDate"> <br> <br>
        
        <button id="checkout">Checkout</button>
    </div>

    <script src="tutorial9.js"></script>
</body>
</html>
