<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Valentines Flowers - Order your flowers online </title>
    <link rel="stylesheet" href="../OrderFlowers/tutorial9.css">
</head>
<body>
    <div class="container">
        <h1> Valentines Flowers </h1>

        <div class="product" id="product1">
            <img src="../OrderFlowers/images/white.jpeg" alt="White Bouquet">
            <div class="description">White Bouquet</div>
            <div class="price">£24</div>
        </div>

        <div class="product" id="product2">
            <img src="../OrderFlowers/images/pink.jpeg" alt="Pink Bouquet">
            <div class="description">Pink Bouquet</div>
            <div class="price">£30</div>
        </div>

        <div class="product" id="product3">
            <img src="../OrderFlowers/images/red.jpeg" alt="Red Bouquet">
            <div class="description">Red Bouquet</div>
            <div class="price">£35</div>
        </div>

        <div class="product" id="product4">
            <img src="../OrderFlowers/images/yellow.jpeg" alt="Yellow Bouquet">
            <div class="description">Yellow Bouquet</div>
            <div class="price">£42</div>
        </div>

        <div class="product" id="product5">
            <img src="../OrderFlowers/images/blue.jpeg" alt="Blue Bouquet">
            <div class="description">Blue Bouquet</div>
            <div class="price">£28</div>
        </div>


        <div class="labelOrder">
            Your Order:
            <div id="orderDescription"></div>
            <div class="product" id="order"></div>
        </div>

        <form id="flowerForm">
            <label for="bouquetOptions">Choose your bouquet:</label> 
            <select id="bouquetOptions" name="bouquetOptions">
                <option value="pleaseSelect">Please Select</option>
                <option value="withChampagne">With Champagne</option>
                <option value="extra">50% Extra Flowers</option>
                <option value="extraWithChampagne">50% Extra Flowers & Champagne</option> 
            </select> 

            <fieldset class="selectFlowers">
                <br>
                <legend>Select Color:</legend>
                <input type="radio" id="white" name="colour" value="white">
                <label for="white">White</label>

                <input type="radio" id="pink" name="colour" value="pink">
                <label for="pink">Pink</label>

                <input type="radio" id="red" name="colour" value="red">
                <label for="red">Red</label>

                <input type="radio" id="yellow" name="colour" value="yellow">
                <label for="yellow">Yellow</label>

                <input type="radio" id="blue" name="colour" value="blue">
                <label for="blue">Blue</label>
            </fieldset>

            <input type="button" value="Place your order" onclick="displayBouquet()" class="placeOrder">
            <input type="reset" value="Reset" class="resetOrder"> <br> <br>
        </form>

    </div> <br><br><br>

    <script src="../OrderFlowers/tutorial9.js"></script>
</body>
</html>
