<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delivery - Valentine's Flowers</title>

<link rel="stylesheet" href="shop.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>

<nav class="navbar">
<div class="nav-logo">
<img src="./images/logo.jpg" alt="logo" id="logo-image">
Valentine's Flowers
</div>

<div class="hamburger" onclick="toggleMenu()">☰</div>

<ul class="nav-links" id="navLinks">
<li><a href="shop.html">Shop</a></li>
<li><a href="cart.html">Cart</a></li>
<li><a href="delivery.html" class="active">Delivery</a></li>
</ul>
</nav>


<div id="deliveryContent" class="delivery-content">

<div class="delivery-form">

<h1>Delivery Details</h1>

<form id="deliveryForm">

<div class="form-group">
<label>Full Name*</label>
<input type="text" id="name" required>
</div>

<div class="form-group">
<label>Email*</label>
<input type="email" id="email" required>
</div>

<div class="form-group">
<label>Phone*</label>
<input type="tel" id="phone" required>
</div>

<div class="form-group">
<label>Address*</label>
<textarea id="address" required></textarea>
</div>


<div class="form-row">

<div class="form-group">
<label>Delivery Date*</label>
<input type="date" id="deliveryDate" required>
</div>

<div class="form-group">
<label>Delivery Time</label>

<select id="deliveryTime">
<option value="anytime">Anytime</option>
<option value="morning">Morning (9am-12pm)</option>
<option value="afternoon">Afternoon (12pm-5pm)</option>
<option value="evening">Evening (5pm-9pm)</option>
</select>

</div>
</div>


<div class="form-group">
<label>Special Instructions</label>
<textarea id="instructions"></textarea>
</div>


<div class="form-group">
<label>Payment Method*</label>

<div class="payment-options">

<label class="payment-option">
<input type="radio" name="payment" value="online" checked>
Online Payment
</label>

<label class="payment-option">
<input type="radio" name="payment" value="cash">
Cash on Delivery
</label>

</div>
</div>


<!-- ONLINE PAYMENT SECTION -->

<div id="onlinePaymentSection">

<div class="form-group">
<label>Card Holder Name*</label>
<input type="text" id="cardName">
</div>

<div class="form-group">
<label>Card Number*</label>
<input type="text" id="cardNumber" placeholder="1234 5678 9012 3456">
</div>

<div class="form-row">

<div class="form-group">
<label>Expiry*</label>
<input type="text" id="expiry" placeholder="MM/YY">
</div>

<div class="form-group">
<label>CVV*</label>
<input type="text" id="cvv" placeholder="123">
</div>

</div>

</div>


<button type="submit" class="submit-btn">
Place Order
</button>

</form>

</div>



<div class="order-summary">

<h2>Order Summary</h2>

<div id="cartSummary"></div>

<p>Total: <span id="totalPrice">£0</span></p>

</div>

</div>



<!-- CONFIRMATION MODAL -->

<div id="confirmationModal" class="modal">

<div class="modal-content">

<h2>Thank You! 🌸</h2>

<p>Your order has been placed successfully.</p>

<p><strong>Email:</strong> <span id="confirmEmail"></span></p>

<p><strong>Phone:</strong> <span id="confirmPhone"></span></p>

<p><strong>Address:</strong> <span id="confirmAddress"></span></p>

<p><strong>Date:</strong> <span id="confirmDate"></span></p>

<p><strong>Payment:</strong> <span id="confirmPayment"></span></p>

<p><strong>Total:</strong> <span id="confirmTotal"></span></p>

<button onclick="closeModal()">Close</button>

</div>

</div>


<script src="delivery.js"></script>

<script>

function toggleMenu(){
document.getElementById("navLinks").classList.toggle("show");
}

</script>

</body>
</html>
