<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valentine's Flowers - Order Online</title>
    <link rel="stylesheet" href="shop.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">

        <div class="nav-logo"><img src="./images/logo.jpg" alt="logo" id="logo-image"> Valentine's Flowers</div>

        <div class="hamburger" onclick="toggleMenu()">☰</div>
        <ul class="nav-links" id="navLinks">
            <li><a href="shop.html">Shop</a></li>
            <li><a href="cart.html">Cart</a></li>
            <li><a href="delivery.html">Delivery</a></li>
        </ul>
    </nav>
    <h1>Order Now !</h1> 

    <!-- Filters -->

    <div class="filters">
        <label for="sort">Sort by Price:</label>
        <select id="sort">
            <option value="default">Default</option>
            <option value="asc">Low to High</option>
            <option value="desc">High to Low</option>
        </select>

        <label for="filter">Filter by Color:</label>
        <select id="filter">
            <option value="all">All</option>
            <option value="white">White</option>
            <option value="pink">Pink</option>
            <option value="red">Red</option>
            <option value="yellow">Yellow</option>
            <option value="blue">Blue</option>
            <option value="multi">Multi</option>
            <option value="green">Green</option>
        </select>
    </div>

    <!-- Products -->
    <div class="container">
        <div class="products" id="productList"></div>
    </div>

    <!-- Order Section -->
    <div class="order-section">
        <h2>Your Order</h2>
        <div id="cart"></div>
        <p>Total: <span id="totalPrice">£0</span></p>

        <label for="champagne" class="cham">Add Champagne (£10 extra):</label>
        <input type="checkbox" id="champagne" onchange="toggleChampagne()"> <br><br>

        <label for="deliveryDate">Delivery Date:</label>
        <input type="date" id="deliveryDate"> <br><br>

        <a href="./cart.html"><button id="checkout">Checkout</button></a>
    </div>

    <!-- Checkout Confirmation Modal -->
    <div id="checkoutModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2>Order Confirmation</h2>
            <div id="orderSummary"></div>
            <p><strong>Total:</strong> <span id="modalTotal">£0</span></p>
            <p><strong>Delivery Date:</strong> <span id="modalDate"></span></p>
        </div>
    </div>


    <script src="shop.js"></script>
</body>
</html>
